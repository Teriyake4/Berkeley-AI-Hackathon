services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - REDIS_URL=${REDIS_URL:-}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHON_BACKEND_URL=http://backend:8000
      - REDIS_URL=
    depends_on:
      - backend
